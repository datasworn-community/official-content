name: Cleanup Canaries

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number whose content canary dist-tags should be removed.
        required: true
        type: string

permissions:
  contents: read

jobs:
  cleanup-canaries:
    name: Remove content canary dist-tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: datasworn-community/.github/.github/actions/bun-build@v1

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Setup npm
        run: |
          npm install --global npm@latest
          npm config set registry https://registry.npmjs.org/
          npm --version

      - name: Remove content PR dist-tags
        uses: datasworn-community/.github/.github/actions/publish-content-packages@v1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          mode: cleanup
          pr-number: ${{ inputs.pr-number }}
